# https://doc.traefik.io/traefik-hub/api-gateway/reference/install/ref-helm
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`dashboard.localhost`)
    entryPoints:
      - web
    middlewares:
    - name: dashboard-auth
      namespace: traefik
providers:
  kubernetesGateway:
    enabled: true
gateway:
  listeners:
    web:
      namespacePolicy:
        from: All
